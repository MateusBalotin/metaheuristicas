<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atividade 7.2 — RBF Série Temporal (entradas t)</title>
<link rel="stylesheet" href="js/style.css">
</head>
<body>
<div class="topbar">
  <a href="index.html">← Home</a>
  <span class="topbar-sep">/</span>
  <span style="font-size:12px;color:var(--text2)">Atividade 7</span>
  <span class="topbar-sep">/</span>
  <span style="font-size:12px">Atividade 7.2 — RBF Série Temporal (entradas t)</span>
</div>
<h1>Atividade 7.2 — RBF para Série Temporal (entradas t)</h1>
<p class="subtitle">σ=1 · θ=1 · u={[1,2],[4,5],[7,8]} · k=2 · 8 padrões · entradas t · sistema 4×4 · UFPR MNE 740</p>

<div class="nav">
  <button id="bprev" onclick="go(-1)" disabled>← Prev</button>
  <button id="bnext" onclick="go(+1)">Next →</button>
  <span class="slbl" id="slbl"></span>
  <button onclick="goTo(0)" style="font-size:11px;padding:3px 8px">Reset</button>
  <button onclick="goTo(TOTAL-1)" style="font-size:11px;padding:3px 8px;background:var(--info-bg);color:var(--info);border:0.5px solid var(--info);border-radius:6px;cursor:pointer">→ Resultado final</button>
</div>

<div class="split">
  <div id="lp" style="min-height:200px"></div>
  <div>
    <div class="leg">
      <span style="display:inline-flex;align-items:center;gap:5px"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#EF9F27"></span>u₁=[1,2]</span>
      <span style="display:inline-flex;align-items:center;gap:5px"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#4a9eff"></span>u₂=[4,5]</span>
      <span style="display:inline-flex;align-items:center;gap:5px"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#5DCAA5"></span>u₃=[7,8]</span>
      <span style="display:inline-flex;align-items:center;gap:5px"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:rgba(30,150,80,0.9)"></span>padrão atual</span>
    </div>
    <canvas id="cv" width="420" height="380" style="width:420px;height:380px;border-radius:6px;display:block"></canvas>
    <div id="cnote" style="font-size:10px;color:var(--text3);margin-top:6px;font-family:monospace"></div>
  </div>
</div>

<script src="js/rbf-temporal-t.js"></script>
<script src="js/rbf-temporal-t-ui.js"></script>
<script>
var exData = rbftst_run();
var TOTAL  = exData.steps.length * 3 + 1;
var cur    = 0;
var renderer = new RbfTsCanvas_T(document.getElementById('cv'));

function si() { return Math.floor(cur / 3); }
function ph() { return cur % 3; }

function render() {
  document.getElementById('bprev').disabled = cur === 0;
  document.getElementById('bnext').disabled = cur === TOTAL - 1;
  if (cur === TOTAL - 1) {
    document.getElementById('slbl').innerHTML = '<span class="badge b1">Resultado Final</span>';
    document.getElementById('lp').innerHTML   = buildRbfTSolvePanel(exData);
    renderer.drawTimeSeries(exData);
    document.getElementById('cnote').textContent = 'Série temporal com predições · MSE = ' + exData.mse.toFixed(6);
  } else {
    var step = exData.steps[si()], phase = ph();
    var pNames = ['apresentar padrão t','calcular φ(t)','adicionar a G'];
    var pBadges = ['b1','b2','b4'];
    document.getElementById('slbl').innerHTML =
      'Padrão <strong>P' + (step.pi+1) + '</strong> t=[' + step.x[0] + ',' + step.x[1] + ']' +
      ' <span class="badge ' + pBadges[phase] + '">' + pNames[phase] + '</span>';
    document.getElementById('lp').innerHTML = buildRbfTPanel(step, phase, exData.config);
    renderer.drawInputSpace(exData, step, phase);
    document.getElementById('cnote').textContent = phase >= 1
      ? 'φ₁=' + step.phis[0].toFixed(4) + '  φ₂=' + step.phis[1].toFixed(4) + '  φ₃=' + step.phis[2].toFixed(4)
      : 't=[' + step.x[0] + ',' + step.x[1] + ']  d=' + step.d;
  }
}

function go(d)   { cur = Math.max(0, Math.min(TOTAL-1, cur+d)); render(); }
function goTo(i) { cur = i; render(); }

document.addEventListener('keydown', function(e) {
  if (e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); go(1); }
  if (e.key==='ArrowLeft')               { e.preventDefault(); go(-1); }
  if (e.key==='Home')                    { e.preventDefault(); goTo(0); }
  if (e.key==='End')                     { e.preventDefault(); goTo(TOTAL-1); }
});
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change', render);
render();
</script>
</body>
</html>
