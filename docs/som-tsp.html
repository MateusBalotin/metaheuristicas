<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atividade 6.1 — SOM para TSP (Burma14)</title>
<link rel="stylesheet" href="js/style.css">
<style>
.cfg-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;padding:10px 14px;border:0.5px solid var(--border3);border-radius:8px;background:var(--bg2);font-size:12px}
.cfg-bar label{color:var(--text3)}
.cfg-bar input[type=number]{width:62px;padding:3px 6px;border:0.5px solid var(--border2);border-radius:5px;background:var(--bg);color:var(--text);font-size:12px;font-family:monospace}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html">← Home</a>
  <span class="topbar-sep">/</span>
  <span style="font-size:12px;color:var(--text2)">Atividade 6</span>
  <span class="topbar-sep">/</span>
  <span style="font-size:12px">Atividade 6.1 — SOM para TSP</span>
</div>
<h1>Atividade 6.1 — SOM para o Problema do Caixeiro Viajante</h1>
<p class="subtitle">Burma14 (TSPLIB) · 14 cidades · anel de neurônios · topologia ring · distância Euclidiana · UFPR MNE 740</p>

<div class="cfg-bar">
  <label>α:</label>
  <input type="number" id="inpA" value="0.5" min="0.05" max="1" step="0.05" style="width:68px">
  <label>Iterações:</label>
  <input type="number" id="inpI" value="3" min="1" max="10" step="1">
  <label>Neurônios:</label>
  <input type="number" id="inpN" value="20" min="15" max="40" step="1">
  <label>Raio₀:</label>
  <input type="number" id="inpR" value="3" min="0" max="10" step="1">
  <button onclick="rebuild()" style="font-size:11px;padding:4px 10px;cursor:pointer;border-radius:6px;border:0.5px solid var(--info);background:var(--info-bg);color:var(--info)">↺ Rebuild</button>
</div>

<div class="nav">
  <button id="bprev" onclick="go(-1)" disabled>← Prev</button>
  <button id="bnext" onclick="go(+1)">Next →</button>
  <span class="slbl" id="slbl"></span>
  <button onclick="goTo(0)" style="font-size:11px;padding:3px 8px">Reset</button>
  <button onclick="goTo(TOTAL-1)" style="font-size:11px;padding:3px 8px;background:var(--info-bg);color:var(--info);border:0.5px solid var(--info);border-radius:6px;cursor:pointer">→ Resultado final</button>
</div>

<div class="split">
  <div id="lp" style="min-height:200px"></div>
  <div>
    <div class="leg">
      <span style="display:inline-flex;align-items:center;gap:5px"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#4a7090"></span>cidades</span>
      <span style="display:inline-flex;align-items:center;gap:5px"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:rgba(239,159,39,0.4);border:2px solid #EF9F27"></span>BMU</span>
      <span style="display:inline-flex;align-items:center;gap:5px"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:rgba(29,158,117,0.4);border:2px solid #0F6E56"></span>vizinhos</span>
    </div>
    <canvas id="cv" width="420" height="420" style="width:420px;height:420px;border-radius:6px;display:block"></canvas>
    <div id="cnote" style="font-size:10px;color:var(--text3);margin-top:6px;font-family:monospace"></div>
  </div>
</div>

<script src="js/som-tsp.js"></script>
<script src="js/som-tsp-ui.js"></script>
<script>
var exData, TOTAL, cur = 0, renderer;
var PHASES = 3;
function totalSteps(d) { return d.steps.length * PHASES + 1; }
function si() { return Math.floor(cur / PHASES); }
function ph() { return cur % PHASES; }

function render() {
  document.getElementById('bprev').disabled = cur === 0;
  document.getElementById('bnext').disabled = cur === TOTAL - 1;
  var isLast = cur === TOTAL - 1;
  if (isLast) {
    document.getElementById('slbl').innerHTML = '<span class="badge b1">Resultado Final</span>';
    document.getElementById('lp').innerHTML   = tsp_summaryPanel(exData);
    renderer.draw(exData.final_weights, null, true, exData.final_mapping);
    document.getElementById('cnote').textContent = 'Mapa final · rota ≈ ' + exData.tour_dist + ' unidades';
  } else {
    var step = exData.steps[si()], phase = ph();
    var pNames = ['apresentar cidade','encontrar BMU','atualizar pesos'];
    var pBadges = ['b1','b2','b4'];
    document.getElementById('slbl').innerHTML =
      'Cidade <strong>' + step.city.label + '</strong> (' + (step.pi+1) + '/' + exData.config.nc + ')' +
      ' iter ' + step.iter + ' <span class="badge ' + pBadges[phase] + '">' + pNames[phase] + '</span>';
    document.getElementById('lp').innerHTML = tsp_buildPanel(step, phase, exData.config);
    var ws = phase < 2 ? step.weights_before : step.weights_after;
    renderer.draw(ws, phase >= 1 ? step : null, false, null);
    document.getElementById('cnote').textContent = phase >= 1
      ? 'BMU: n' + (step.winner+1) + '  ·  vizinhos: ' + step.neighbors.map(function(n){return 'n'+(n+1);}).join(', ')
      : 'Cidade ' + step.city.label + ' = [' + step.city.x + ', ' + step.city.y + ']';
  }
}

function go(d)   { cur = Math.max(0, Math.min(TOTAL-1, cur+d)); render(); }
function goTo(i) { cur = i; render(); }

function rebuild() {
  var alpha     = parseFloat(document.getElementById('inpA').value) || 0.5;
  var n_iters   = parseInt(  document.getElementById('inpI').value) || 3;
  var n_neurons = parseInt(  document.getElementById('inpN').value) || 20;
  var radius0   = parseInt(  document.getElementById('inpR').value);
  if (isNaN(radius0)) radius0 = 3;
  exData   = tsp_run(alpha, n_iters, n_neurons, radius0);
  TOTAL    = totalSteps(exData);
  renderer = new TSP_CanvasRenderer(document.getElementById('cv'));
  cur = 0; render();
}

document.addEventListener('keydown', function(e) {
  if (e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); go(1); }
  if (e.key==='ArrowLeft')               { e.preventDefault(); go(-1); }
  if (e.key==='Home')                    { e.preventDefault(); goTo(0); }
  if (e.key==='End')                     { e.preventDefault(); goTo(TOTAL-1); }
});
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change', render);
rebuild();
</script>
</body>
</html>
