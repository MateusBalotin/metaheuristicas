<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity 3 · Ex1 — Function Approximation</title>
<link rel="stylesheet" href="js/style.css">
<style>
.cfg-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;padding:10px 14px;border:0.5px solid var(--border3);border-radius:8px;background:var(--bg2);font-size:12px}
.cfg-bar label{color:var(--text3)}
.cfg-bar input[type=number]{width:65px;padding:3px 6px;border:0.5px solid var(--border2);border-radius:5px;background:var(--bg);color:var(--text);font-size:12px;font-family:monospace}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html">← Home</a>
  <span class="topbar-sep">/</span>
  <span style="font-size:12px;color:var(--text2)">Activity 3</span>
  <span class="topbar-sep">/</span>
  <span style="font-size:12px">Exercise 1 — Function Approximation</span>
</div>
<h1>Exercise 1 — MLP Function Approximation</h1>
<p class="subtitle">13 training points · linear output neuron · sigmoid hidden · UFPR MNE 740</p>

<div class="cfg-bar">
  <label>Hidden neurons:</label>
  <input type="number" id="inpH" value="6" min="2" max="12" step="1">
  <label>α:</label>
  <input type="number" id="inpA" value="0.1" min="0.001" max="1" step="0.001" style="width:72px">
  <label>Iterations:</label>
  <input type="number" id="inpI" value="500" min="1" max="5000" step="50">
  <label>Seed:</label>
  <input type="number" id="inpS" value="42" min="0" max="9999" step="1" style="width:72px">
  <button onclick="rebuild()" style="font-size:11px;padding:4px 10px;cursor:pointer;border-radius:6px;border:0.5px solid var(--info);background:var(--info-bg);color:var(--info)">↺ Rebuild</button>
  <button onclick="document.getElementById('inpS').value=Math.floor(Math.random()*9999);rebuild();" style="font-size:11px;padding:4px 10px;cursor:pointer;border-radius:6px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text)">🎲 Seed</button>
</div>

<div class="nav">
  <button id="bprev" onclick="go(-1)" disabled>← Prev</button>
  <button id="bnext" onclick="go(+1)">Next →</button>
  <span class="slbl" id="slbl"></span>
  <button onclick="goTo(0)" style="font-size:11px;padding:3px 8px">Reset</button>
  <button onclick="goTo(TOTAL-1)" style="font-size:11px;padding:3px 8px;background:var(--info-bg);color:var(--info);border:0.5px solid var(--info);border-radius:6px;cursor:pointer">→ Final results</button>
</div>

<div class="split">
  <div id="lp"></div>
  <div>
    <div class="leg">
      <span style="display:inline-flex;align-items:center;gap:4px">
        <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:rgba(29,158,117,0.88);border:1.5px solid #0F6E56"></span>d (target)
      </span>
      <span style="display:inline-flex;align-items:center;gap:4px">
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:rgba(186,117,23,0.85);border:1px solid #BA7517"></span>y (output)
      </span>
      <span style="display:inline-flex;align-items:center;gap:4px">
        <span style="display:inline-block;width:24px;height:2px;background:#185FA5"></span>learned curve
      </span>
    </div>
    <canvas id="cv" width="420" height="420" style="width:420px;height:420px;border-radius:6px;display:block"></canvas>
    <div class="offnote" id="cnote"></div>
  </div>
</div>

<script src="js/func-approx.js"></script>
<script src="js/func-approx-ui.js"></script>
<script>
var PHASES = 3, exData, TOTAL, cur = 0;
var renderer = new fa_CanvasRenderer(document.getElementById('cv'));

function si() { return Math.floor(cur / PHASES); }
function ph() { return cur % PHASES; }
function isEnd() { return cur === TOTAL - 1; }

function rebuild() {
  var nH = parseInt(document.getElementById('inpH').value) || 6;
  var al = parseFloat(document.getElementById('inpA').value) || 0.1;
  var ni = parseInt(document.getElementById('inpI').value) || 500;
  var sd = parseInt(document.getElementById('inpS').value) || 42;
  exData = fa_buildSteps(nH, al, ni, sd);
  TOTAL  = exData.steps.length * PHASES + 1;
  cur    = 0; render();
}

function render() {
  document.getElementById('bprev').disabled = cur === 0;
  document.getElementById('bnext').disabled = cur === TOTAL - 1;

  if (isEnd()) {
    document.getElementById('slbl').innerHTML = '<span class="badge b1">Summary</span>';
    document.getElementById('lp').innerHTML   = fa_testPanelHTML(exData);
    renderer.draw(exData.finalWs, null, true);
    document.getElementById('cnote').textContent = 'Learned curve — final iteration';
  } else {
    var step = exData.steps[si()], phase = ph();
    var pNames  = ['forward pass','output update','hidden update'];
    var pBadges = ['b1','b2','b4'];
    document.getElementById('slbl').innerHTML =
      'Iter '+step.iter+' — n='+step.p.n+' ('+(step.pi+1)+'/'+FUNC_APPROX_EX.train.length+') ' +
      '<span class="badge '+pBadges[phase]+'">'+pNames[phase]+'</span>';
    document.getElementById('lp').innerHTML = fa_buildPanel(step, phase);
    var ws = phase === 0 ? step.wsBefore : step.wsAfter;
    renderer.draw(ws, phase === 0 ? step.pi : null, phase >= 2);
    document.getElementById('cnote').textContent = phase >= 2 ? 'Curve updates after this step' : '';
  }
}

function go(d)   { cur = Math.max(0, Math.min(TOTAL-1, cur+d)); render(); }
function goTo(i) { cur = i; render(); }

document.addEventListener('keydown', function(e) {
  if (e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); go(1); }
  if (e.key==='ArrowLeft')  { e.preventDefault(); go(-1); }
  if (e.key==='Home')       { e.preventDefault(); goTo(0); }
  if (e.key==='End')        { e.preventDefault(); goTo(TOTAL-1); }
});
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change', render);

rebuild();
</script>
</body>
</html>
