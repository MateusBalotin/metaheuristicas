<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity 5 · Ex4 — Hebb Network</title>
<link rel="stylesheet" href="/static/js/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
.cfg-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;padding:10px 14px;border:0.5px solid var(--border3);border-radius:8px;background:var(--bg2);font-size:12px}
.cfg-bar label{color:var(--text3)}
.cfg-bar input[type=number]{width:65px;padding:3px 6px;border:0.5px solid var(--border2);border-radius:5px;background:var(--bg);color:var(--text);font-size:12px;font-family:monospace}
.btn-accent{background:var(--info-bg);color:var(--info);border-color:var(--info)}
</style>
</head>
<body>
<div class="topbar">
  <a href="/">← Home</a>
  <span class="topbar-sep">/</span>
  <span style="font-size:12px;color:var(--text2)">Activity 5</span>
  <span class="topbar-sep">/</span>
  <span style="font-size:12px">Exercise 4 — Hebb Network</span>
</div>
<h1>Exercise 4 — Hebb Network (22 points)</h1>
<p class="subtitle">22 training · 8 test · inputs normalized to [−1,1] · always updates · UFPR MNE 740</p>

<div class="cfg-bar">
  <label>α:</label>
  <input type="number" id="inpA" value="1" min="0.01" max="2" step="0.01" style="width:72px">
  <label>Iterations:</label>
  <input type="number" id="inpI" value="3" min="1" max="20" step="1" style="width:65px">
  <button class="nav btn-accent" style="font-size:11px;padding:4px 10px" onclick="rebuild()">↺ Rebuild</button>
</div>

<div class="nav">
  <button id="bprev" disabled>← Prev</button>
  <button id="bnext">Next →</button>
  <span class="slbl" id="slbl"></span>
  <button id="breset" style="font-size:11px;padding:3px 8px">Reset</button>
  <button id="btest"  style="font-size:11px;padding:3px 8px;background:var(--info-bg);color:var(--info);border:0.5px solid var(--info);border-radius:6px;cursor:pointer">→ Final results</button>
</div>

<div class="split">
  <div id="lp"></div>
  <div>
    <div class="leg">
      <span style="display:inline-flex;align-items:center;gap:4px">
        <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:rgba(29,158,117,0.88);border:1.5px solid #0F6E56"></span>d=+1
      </span>
      <span style="display:inline-flex;align-items:center;gap:4px">
        <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:rgba(216,90,48,0.88);border:1.5px solid #993C1D"></span>d=−1
      </span>
      <span style="display:inline-flex;align-items:center;gap:4px">
        <span style="display:inline-block;width:20px;height:1.5px;border-top:2px dashed #6d28d9"></span>boundary
      </span>
    </div>
    <canvas id="cv" width="420" height="560" style="width:420px;height:560px;border-radius:6px;display:block"></canvas>
  </div>
</div>

<script src="/static/js/canvas.js"></script>
<script src="/static/js/hebb_ui.js"></script>
<script>
var exData, nav, renderer, trainPts;
var PHASES = 3;

function getConfig() {
  return {
    alpha:   parseFloat(document.getElementById('inpA').value) || 1,
    n_iters: parseInt(  document.getElementById('inpI').value) || 1,
  };
}

function totalSteps(data) { return data.steps.length * PHASES + 1; }

function render(cur) {
  var n    = exData.steps.length;
  var TOTAL = totalSteps(exData);
  var isLast = cur === TOTAL - 1;
  var si = Math.floor(cur / PHASES), ph = cur % PHASES;

  if (isLast) {
    document.getElementById('slbl').innerHTML = '<span class="badge b1">Summary</span>';
    document.getElementById('lp').innerHTML   = buildHebbSummaryPanel(exData);
    var fw = exData.final_weights;
    renderer.draw(fw, null, trainPts, true,
      exData.steps[n-1].train_results, true, exData.config.norm);
  } else {
    var step = exData.steps[si], phase = ph;
    var pNames  = ['normalize','compute y*','update w'];
    var pBadges = ['b1','b2','b4'];
    document.getElementById('slbl').innerHTML =
      'Pattern n=' + step.pattern.n + ' (' + (step.pi + 1) + '/' + trainPts.length + ')' +
      ' iter ' + step.iter +
      ' <span class="badge ' + pBadges[phase] + '">' + pNames[phase] + '</span>';
    document.getElementById('lp').innerHTML = buildHebbPanel(step, phase, trainPts);
    var ws = phase < 2 ? step.weights_before : step.weights_after;
    var showLine = phase >= 2;
    renderer.draw(ws, step.pi, trainPts, false, step.train_results, showLine, exData.config.norm);
  }
}

function rebuild() {
  var cfg = getConfig();
  var url = '/api/hebb?alpha=' + cfg.alpha + '&n_iters=' + cfg.n_iters;
  document.getElementById('lp').innerHTML = '<div style="color:var(--text3);font-size:12px;padding:20px">Loading\u2026</div>';
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      exData   = data;
      renderer = new HebbCanvas(document.getElementById('cv'), data.config.canvas);
      var seen = {}, pts = [];
      data.steps.forEach(function(s) {
        if (!seen[s.pattern.n]) { seen[s.pattern.n] = 1; pts.push(s.pattern); }
      });
      trainPts = pts.sort(function(a, b) { return a.n - b.n; });

      var TOTAL = totalSteps(data);
      if (nav) { nav.total = TOTAL; nav.goTo(0); return; }
      nav = new NavController({
        total: TOTAL,
        onRender: function(cur) { render(cur); }
      });
      nav.start();
      window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change', function() { nav.goTo(nav.cur); });
    });
}

rebuild();
</script>
</body>
</html>
