<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity 4 · Ex5 — RBF Function Approximation</title>
<link rel="stylesheet" href="/static/js/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
.cfg-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;padding:10px 14px;border:0.5px solid var(--border3);border-radius:8px;background:var(--bg2);font-size:12px}
.cfg-bar label{color:var(--text3)}
.cfg-bar input[type=number]{width:65px;padding:3px 6px;border:0.5px solid var(--border2);border-radius:5px;background:var(--bg);color:var(--text);font-size:12px;font-family:monospace}
.btn-accent{background:var(--info-bg);color:var(--info);border-color:var(--info)}
</style>
</head>
<body>
<div class="topbar">
  <a href="/">← Home</a>
  <span class="topbar-sep">/</span>
  <span style="font-size:12px;color:var(--text2)">Activity 4</span>
  <span class="topbar-sep">/</span>
  <span style="font-size:12px">Exercise 5 — RBF Function Approximation</span>
</div>
<h1>Exercise 5 — RBF Network: sin(x) + 4cos(x) − 1</h1>
<p class="subtitle">21 points · [-2, 4] · 4 RBF centers · Gaussian basis · w = (G<sup>T</sup>G)<sup>-1</sup>G<sup>T</sup>d · UFPR MNE 740</p>

<div class="cfg-bar">
  <label>Centers q:</label>
  <input type="number" id="inpQ" value="4" min="1" max="10" step="1" style="width:55px">
  <label>σ:</label>
  <input type="number" id="inpS" value="1.5" min="0.1" max="5" step="0.1" style="width:65px">
  <label>Seed:</label>
  <input type="number" id="inpSeed" value="42" min="0" max="9999" step="1" style="width:72px">
  <button class="nav btn-accent" style="font-size:11px;padding:4px 10px" onclick="rebuild()">↺ Rebuild</button>
  <button class="nav" style="font-size:11px;padding:4px 10px" onclick="document.getElementById('inpSeed').value=Math.floor(Math.random()*9999);rebuild()">🎲 Seed</button>
</div>

<div class="nav">
  <button id="bprev" disabled>← Prev</button>
  <button id="bnext">Next →</button>
  <span class="slbl" id="slbl"></span>
  <button id="breset" style="font-size:11px;padding:3px 8px">Reset</button>
  <button id="btest"  style="font-size:11px;padding:3px 8px;background:var(--info-bg);color:var(--info);border:0.5px solid var(--info);border-radius:6px;cursor:pointer">→ Final results</button>
</div>

<div class="split">
  <div id="lp"></div>
  <div>
    <div class="leg">
      <span style="display:inline-flex;align-items:center;gap:4px">
        <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:rgba(29,158,117,0.88);border:1.5px solid #0F6E56"></span>
        d (target)
      </span>
      <span style="display:inline-flex;align-items:center;gap:4px">
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:rgba(186,117,23,0.85);border:1px solid #BA7517"></span>
        y (RBF output)
      </span>
      <span style="display:inline-flex;align-items:center;gap:4px">
        <span style="display:inline-block;width:20px;height:2px;background:#185FA5"></span>
        learned curve
      </span>
      <span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--info)">
        <span style="display:inline-block;width:12px;height:1px;border-top:1.5px dashed #185FA5"></span>
        centers
      </span>
    </div>
    <canvas id="cv" width="420" height="420" style="width:420px;height:420px;border-radius:6px;display:block"></canvas>
  </div>
</div>

<script src="/static/js/canvas.js"></script>
<script src="/static/js/rbf_ui.js"></script>
<script>
var exData, nav, renderer;

// Steps:  0..n-1 = build G row by row
//         n      = show G^T G
//         n+1    = show G^T d
//         n+2    = solve for w
//         n+3    = summary

function getConfig() {
  return {
    q:    parseInt(  document.getElementById('inpQ').value)    || 4,
    sigma: parseFloat(document.getElementById('inpS').value)   || 1.5,
    seed:  parseInt(  document.getElementById('inpSeed').value) || 42,
  };
}

function totalSteps(data) { return data.train.length + 4; }

function render(cur) {
  var n = exData.train.length;
  if (cur < n) {
    document.getElementById('slbl').innerHTML =
      'Build G \u2014 row ' + (cur + 1) + '/' + n +
      ' <span class="badge b1">φ computations</span>';
    document.getElementById('lp').innerHTML = buildRbfGRowPanel(exData, cur);
    renderer.draw(exData, cur, false);
  } else if (cur === n) {
    document.getElementById('slbl').innerHTML = '<span class="badge b2">G\u1D40G matrix</span>';
    document.getElementById('lp').innerHTML = buildRbfGTGPanel(exData);
    renderer.draw(exData, null, false);
  } else if (cur === n + 1) {
    document.getElementById('slbl').innerHTML = '<span class="badge b3">G\u1D40d vector</span>';
    document.getElementById('lp').innerHTML = buildRbfGTdPanel(exData);
    renderer.draw(exData, null, false);
  } else if (cur === n + 2) {
    document.getElementById('slbl').innerHTML = '<span class="badge b4">Solve for w</span>';
    document.getElementById('lp').innerHTML = buildRbfSolvePanel(exData);
    renderer.draw(exData, null, true);
  } else {
    document.getElementById('slbl').innerHTML = '<span class="badge b1">Summary</span>';
    document.getElementById('lp').innerHTML = buildRbfSummaryPanel(exData);
    renderer.draw(exData, null, true);
  }
}

function rebuild() {
  var cfg = getConfig();
  var url = '/api/rbf?q=' + cfg.q + '&sigma=' + cfg.sigma + '&seed=' + cfg.seed;
  document.getElementById('lp').innerHTML = '<div style="color:var(--text3);font-size:12px;padding:20px">Loading\u2026</div>';
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      exData   = data;
      var TOTAL = totalSteps(data);
      renderer = new RbfCanvas(document.getElementById('cv'), data.config.canvas);

      if (nav) { nav.total = TOTAL; nav.goTo(0); return; }

      nav = new NavController({
        total: TOTAL,
        onRender: function(cur) { render(cur); }
      });
      nav.start();
      window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change', function() { nav.goTo(nav.cur); });
    });
}

rebuild();
</script>
</body>
</html>
