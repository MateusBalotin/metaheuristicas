<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity 3 · Ex2 — MLP 3 layers</title>
<link rel="stylesheet" href="/static/js/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
.cfg-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;padding:10px 14px;border:0.5px solid var(--border3);border-radius:8px;background:var(--bg2);font-size:12px}
.cfg-bar label{color:var(--text3)}
.cfg-bar input[type=number]{width:65px;padding:3px 6px;border:0.5px solid var(--border2);border-radius:5px;background:var(--bg);color:var(--text);font-size:12px;font-family:monospace}
.btn-accent{background:var(--info-bg);color:var(--info);border-color:var(--info)}
</style>
</head>
<body>
<div class="topbar">
  <a href="/">← Home</a>
  <span class="topbar-sep">/</span>
  <span style="font-size:12px;color:var(--text2)">Activity 3</span>
  <span class="topbar-sep">/</span>
  <span style="font-size:12px">Exercise 2 — MLP with Momentum</span>
</div>
<h1>Exercise 2 — MLP Backpropagation with Momentum</h1>
<p class="subtitle">5 patterns · 3 hidden neurons · sigmoid · fixed initial weights · UFPR MNE 740</p>

<div class="cfg-bar">
  <label>γ (momentum):</label>
  <input type="number" id="inpG" value="0.6" min="0" max="0.99" step="0.05" style="width:72px">
  <span style="color:var(--text3);font-size:11px">α=1 fixed · normally γ ∈ [0.5, 0.9]</span>
</div>

<div class="nav">
  <button id="bprev" disabled>← Prev</button>
  <button id="bnext">Next →</button>
  <span class="slbl" id="slbl"></span>
  <button id="breset" style="font-size:11px;padding:3px 8px">Reset</button>
  <button id="btest" style="font-size:11px;padding:3px 8px;background:var(--info-bg);color:var(--info);border:0.5px solid var(--info);border-radius:6px;cursor:pointer">→ Final results</button>
</div>

<div class="split">
  <div id="lp"></div>
  <div>
    <div class="leg">
      <span style="display:inline-flex;align-items:center;gap:4px">
        <span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:rgba(29,200,140,0.4);border:1px solid rgba(29,200,140,0.7)"></span>y≥0.5 → Class A
      </span>
      <span style="display:inline-flex;align-items:center;gap:4px">
        <span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:rgba(220,80,40,0.4);border:1px solid rgba(220,80,40,0.7)"></span>y&lt;0.5 → Class B
      </span>
      <span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--info)">
        ■ momentum term
      </span>
    </div>
    <canvas id="cv" width="420" height="420" style="width:420px;height:420px;border-radius:6px;display:block"></canvas>
  </div>
</div>

<script src="/static/js/canvas.js"></script>
<script src="/static/js/mlp_momentum_ui.js"></script>
<script>
var exData, PHASES = 3, nav, renderer, trainPts, gamma;

function getGamma() { return parseFloat(document.getElementById('inpG').value) || 0.6; }

fetch('/api/mlp-momentum?gamma=' + getGamma())
  .then(function(r) { return r.json(); })
  .then(function(data) {
    exData  = data;
    gamma   = data.config.gamma;
    renderer = new MlpMomentumCanvas(document.getElementById('cv'), data.config.canvas);

    var seen = {}, pts = [];
    data.steps.forEach(function(s) {
      if (!seen[s.pattern.n]) { seen[s.pattern.n] = 1; pts.push(s.pattern); }
    });
    trainPts = pts.sort(function(a, b) { return a.n - b.n; });

    var TOTAL = data.steps.length * PHASES + 1;

    nav = new NavController({
      total: TOTAL,
      onRender: function(cur) {
        var isLast = cur === nav.total - 1;
        var si = Math.floor(cur / PHASES), ph = cur % PHASES;

        if (isLast) {
          document.getElementById('slbl').innerHTML = '<span class="badge b1">Summary</span>';
          document.getElementById('lp').innerHTML   = buildMlpMomentumTestPanel(exData);
          renderer.draw(exData.final_weights, null, trainPts, true,
            exData.steps[exData.steps.length - 1].train_results, true);
        } else {
          var step   = data.steps[si], phase = ph;
          var pNames  = ['forward pass', 'output update', 'hidden update'];
          var pBadges = ['b1', 'b2', 'b4'];
          document.getElementById('slbl').innerHTML =
            'Iter ' + step.iter + ' — Pat ' + (step.pattern.label || step.pattern.n) +
            ' (' + (step.pi + 1) + '/' + trainPts.length + ')' +
            ' <span class="badge ' + pBadges[phase] + '">' + pNames[phase] + '</span>';
          document.getElementById('lp').innerHTML = buildMlpMomentumPanel(step, phase, trainPts, gamma);
          var ws = phase === 0 ? step.weights_before : step.weights_after;
          renderer.draw(ws, step.pi, trainPts, false, step.train_results, false);
        }
      }
    });

    nav.start();
    window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change', function() {
      nav.goTo(nav.cur);
    });
  });
</script>
</body>
</html>
